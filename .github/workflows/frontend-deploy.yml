name: Frontend Deploy (S3 + CloudFront)

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/frontend-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: vibe-check-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate frontend deploy variables
        env:
          FRONTEND_AWS_ROLE_ARN: ${{ vars.FRONTEND_AWS_ROLE_ARN }}
          FRONTEND_AWS_REGION: ${{ vars.FRONTEND_AWS_REGION }}
          FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
          FRONTEND_CLOUDFRONT_DIST_ID: ${{ vars.FRONTEND_CLOUDFRONT_DIST_ID }}
          FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
        run: |
          set -euo pipefail

          missing=()
          for var in FRONTEND_AWS_ROLE_ARN FRONTEND_AWS_REGION FRONTEND_S3_BUCKET FRONTEND_CLOUDFRONT_DIST_ID FRONTEND_API_BASE_URL; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub variables: ${missing[*]}"
            exit 1
          fi

      - name: Generate runtime frontend config
        run: |
          cat > web/runtime-config.js << 'EOF'
          window.VIBE_CONFIG = {
            API_BASE: "${{ vars.FRONTEND_API_BASE_URL }}"
          };
          EOF

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.FRONTEND_AWS_ROLE_ARN }}
          aws-region: ${{ vars.FRONTEND_AWS_REGION }}

      - name: Upload static assets with cache headers
        run: |
          aws s3 sync web/ s3://${{ vars.FRONTEND_S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html with no-cache
        run: |
          aws s3 cp web/index.html s3://${{ vars.FRONTEND_S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.FRONTEND_CLOUDFRONT_DIST_ID }}" \
            --paths "/*"
