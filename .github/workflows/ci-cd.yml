name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: vibe-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q

  deploy-aws:
    name: Deploy to AWS
    runs-on: self-hosted
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Pull latest code
        run: |
          cd /home/ubuntu/vibe-check
          git pull origin main

      - name: Install dependencies
        run: |
          cd /home/ubuntu/vibe-check
          .venv/bin/pip install -r requirements.txt --quiet

      - name: Restart app
        run: sudo systemctl restart vibe-check
